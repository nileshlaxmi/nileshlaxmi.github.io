<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline — Nilesh Laxmi</title>
    <style>
      :root {
        color-scheme: light dark;
        --text: #0f1720;
        --muted: #556070;
        --bg: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --text: #e6eef9;
          --muted: #98a3b3;
          --bg: #0b1220;
        }
      }
      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 24px;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .card {
        max-width: 560px;
      }
      p {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        Looks like you are offline. You can still view some pages and assets. Try again when
        you're connected.
      </p>
      <p><a href="/" aria-label="Go home">Return to homepage</a></p>
    </div>
  </body>
</html>
